version: "1.0.0"
metadata:
  name: "Email Classifier"
  description: "Classifies emails into 4 categories based on their content."
  author: "Sean Kim"
  updated_at: "2026-06-26"
  target_model: "gpt-4o-mini"
  temperature: 0.0

system_prompt: |
  You are a customer support email classifier.

  Analyze the email below and respond with ONLY a JSON object in this exact format:
  {{
  "category": "<one of: billing, technical, account, general>",
  "summary": "<one sentence describing the customer's issue>"
  }}

  Rules:
  - category must be exactly one of the four options
  - summary must be a single sentence, under 20 words
  - Do not include any text outside the JSON object

user_prompt_template: |
  Email to classify:
  {email}

# 25 billing -> 25 technical -> 25 account -> general
few_shot_examples:
  - input: |
      Subject: Bill charged twice
      Body: Hello, I noticed that I was charged twice this month, if this could be fixed asap, that would be great
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer was charged twice for their spending."
      }
  - input: |
      Subject: How to stop auto pay
      Body: Hello, I want to stop my auto payment system, but I do not know how. If I could get some instructions, that would be great
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer wants directions for disabling auto payment system"
      }
  - input: |
      Subject: Forgot to cancel free trial
      Body: Hello, I forgot to cancel after my free trial ended and was charged. I want a refund, and I have not used the service at all after the trial
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer forgot to cancel free trial in time, and wants a refund for the charged amount"
      }
  - input: |
      Subject: Inquiry about failed payment
      Body: My payment was failed, and I have no idea why. Can you check my account and see what is going on?
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer's payment was failed and wants to know reason behind it"
      }
  - input: |
      Subject: Cannot access account
      Body: I cannot access the paid feature of the website because my account was suspended. The reason is because the auto payment failed, but I do not know why. Could I get some insight into the issue?
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer's wants to know why their auto payment failed."
      }
  - input: |
      Subject: Deleting account
      Body: I am going to completely delete my account, and I want to be completely sure that I will not be charged next month.
    expected_output: |
      {
        "category": "billing",
        "summary": "Customer wants explicit confirmation that they will not be charged next month after deleting account."
      }
  - input: |
      Subject: Question about "Service Fee"
      Body: I am on your checkout page for the pro plan and I see a random 15 dollar service fee that I did not see anywhere. What is it? and can it be removed?
    expected_output: |
      {
        "category": "billing",
        "summary": "Prospective customer disputing an unexpected service fee at checkout"
      }
  - input: |
      Subject: 
  - input: |
      Subject: Can't Log In
      Body: I forgot my password and can't access my account. Can you assist me?
    expected_output: |
      {
        "category": "account",
        "summary": "Customer cannot log in due to a forgotten password."
      }
  - input: |
      Subject: App Crashes
      Body: The app crashes every time I try to open it on my phone.
    expected_output: |
      {
        "category": "technical",
        "summary": "App crashes on launch for the customer."
      }
  - input: |
      Subject: General Inquiry
      Body: What are your business hours and where are you located?
    expected_output: |
      {
        "category": "general",
        "summary": "Customer is asking about business hours and location."
      }
  - input: |
      Subject: login not working
      Body: My login attempts keep failing and I have no clue what's going on. Please help
    expected_output: |
      {
        "category": "account",
        "summary": "Customer is unable to log in and seeks assistance."
      }